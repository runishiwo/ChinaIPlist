name: update-cn-ip-netaddr

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests netaddr

      - run: python src/build.py

      - name: commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add output/cn_v4.txt output/cn_v6.txt output/cnip.txt
          git commit -m "auto update cn ip (netaddr merge)" || echo "no changes"
          git push
