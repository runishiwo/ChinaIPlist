name: CNIP Auto Update

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1. 拉代码
      - uses: actions/checkout@v4

      # 2. Python环境
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. 依赖
      - run: pip install requests netaddr

      # 4. 生成IP
      - run: python src/build.py

      # 5. 确保目录
      - run: mkdir -p output

      # 6. Git提交（强制记录）
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add -A

          git commit --allow-empty -m "CNIP update $(date '+%Y-%m-%d %H:%M:%S')"

          git pull --rebase || true
          git push || true
